server:
  addr: 127.0.0.1:18880
  timezone: Asia/Shanghai

database:
  path: data/nyamedia.db

tools:
  ffmpeg: ffmpeg
  ffprobe: ffprobe
  mkvextract: mkvextract
  mediainfo: mediainfo

processing:
  extensions:
    - .mkv
    - .mp4
    - .ts
    - .m2ts
    - .mts
    - .mov
    - .m4v
    - .avi
    - .wmv
    - .flv
    - .webm
    - .rmvb
    - .rm
    - .mpg
    - .mpeg
    - .vob
    - .asf
  concurrency: 2
  stableDelay: 30s
  stableChecks: 2
  bifWidth: 320
  bifInterval: 10
  bifHwAccel: cpu
  overwriteExisting: false
  enableSubtitles: true
  enableMediaInfo: true
  enableNfo: true
  enableBif: true
  enableImageTakeover: false

scraping:
  enableTmdb: true
  enablePeople: true
  preferOriginalLanguagePoster: false
  imageSources:
    - tmdb
    - tvdb
    - fanart
  fanartApiKey: ""
  fanartBaseUrl: https://webservice.fanart.tv/v3
  tmdbApiKey: ""
  tmdbToken: ""
  tmdbBaseUrl: https://api.themoviedb.org/3
  language: zh-CN
  fallbackLanguages:
    - zh-TW
    - ja-JP
    - en-US
  region: CN
  proxy: ""

watchDirs: []
